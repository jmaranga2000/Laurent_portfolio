<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-labelledby="whmTitle"
>
<title id="whmTitle">WHM</title>

<defs>
  <linearGradient id="whmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FF6C2C"/>
    <stop offset="100%" stop-color="#FF9A4D"/>
  </linearGradient>
</defs>

<!-- Background circle -->
<circle cx="128" cy="128" r="120" fill="url(#whmGradient)" />

<!-- Server stack -->
<rect x="72" y="80" width="112" height="28" rx="6" fill="#ffffff"/>
<rect x="72" y="116" width="112" height="28" rx="6" fill="#ffffff"/>
<rect x="72" y="152" width="112" height="28" rx="6" fill="#ffffff"/>

<!-- Status lights -->
<circle cx="90" cy="94" r="4" fill="#FF6C2C"/>
<circle cx="90" cy="130" r="4" fill="#FF6C2C"/>
<circle cx="90" cy="166" r="4" fill="#FF6C2C"/>

<!-- WHM text -->
<text
  x="128"
  y="210"
  text-anchor="middle"
  font-family="Arial, Helvetica, sans-serif"
  font-size="24"
  fill="#ffffff"
  font-weight="bold"
>
WHM
</text>

</svg>